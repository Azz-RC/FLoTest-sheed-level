<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — FloTest</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-logo"><div class="brand-icon">Flo</div><span class="brand-name">Flo<span>Test</span></span></div>
      </div>
      <div class="sidebar-user">
        <div class="user-avatar">ADM</div>
        <div class="user-info"><div class="user-name">Super Admin</div><div class="user-role">Admin</div></div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-label">Menu</div>
        <a href="dashboard.html" class="nav-item active">🏠 Dashboard</a>
        <a href="users/index.html" class="nav-item">👥 Kelola Users</a>
        <a href="tests/index.html" class="nav-item">📝 Kelola Tes</a>
      </nav>
      <div class="sidebar-footer"><a href="../index.html" class="nav-item btn-danger">🚪 Keluar</a></div>
    </aside>

    <div class="main-content">
      <header class="topbar"><span class="topbar-title">Panel Kendali Admin</span></header>
      <main class="page-body">
        <div class="page-header">
          <h1>Ringkasan Sistem FloTest 🚀</h1>
          <p>Memantau dan mengelola seluruh data pengguna serta bank ujian sistem.</p>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon blue">👥</div>
            <div class="stat-info"><div class="stat-value">32</div><div class="stat-label">Total Pengguna</div></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green">📝</div>
            <div class="stat-info"><div class="stat-value">12</div><div class="stat-label">Total Ujian aktif</div></div>
          </div>
        </div>
      </main>
      <footer><span>© 2026 FloTest</span></footer>
    </div>
  </div>

</body>
</html>

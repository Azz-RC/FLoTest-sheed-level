<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buat Paket Ujian Baru — FloTest</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body>

<div class="app-layout">

  <aside class="sidebar">

    <div class="sidebar-brand">
      <div class="brand-logo">
        <div class="brand-icon">Flo</div>
        <span class="brand-name">Flo<span>Test</span></span>
      </div>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar">ADM</div>
      <div class="user-info">
        <div class="user-name">Super Admin</div>
        <div class="user-role">Admin</div>
      </div>
    </div>

    <nav class="sidebar-nav">

      <div class="nav-label">Navigasi</div>

      <a href="../dashboard.html" class="nav-item">
        🏠 Dashboard Admin
      </a>

      <a href="index.html" class="nav-item active">
        ⬅️ Kembali ke Daftar Tests
      </a>

    </nav>

    <div class="sidebar-footer">
      <a href="../../index.html" class="nav-item btn-danger">
        🚪 Logout
      </a>
    </div>

  </aside>

  <div class="main-content">

    <header class="topbar">
      <span class="topbar-title">Panel Admin / Tambah Ujian Baru</span>
    </header>

    <main class="page-body">

      <section class="page-header">
        <h1>➕ Create Test Form</h1>
        <p>Rancang paket ujian baru untuk menguji kompetensi menti.</p>
      </section>

      <section class="card card-form">

        <form
          action="index.html"
          method="GET"
          onsubmit="alert('Paket ujian berhasil ditambahkan!');">

          <div class="form-group">
            <label for="title" class="form-label">Judul Paket Ujian (Title)</label>
            <input
              id="title"
              type="text"
              class="form-input"
              placeholder="Contoh: Dasar Pemrograman"
              required>
          </div>

          <div class="form-group">
            <label for="description" class="form-label">Deskripsi / Petunjuk Ujian</label>
            <textarea
              id="description"
              class="form-input"
              rows="4"
              placeholder="Tulis instruksi pengerjaan, durasi, KKM, atau materi cakupan ujian..."></textarea>
          </div>

          <div class="form-group">
            <label for="mentor" class="form-label">Penanggung Jawab / Mentor</label>
            <select id="mentor" class="form-input" required>
              <option value="">-- Pilih Mentor --</option>
              <option value="Budi Santoso">Budi Santoso</option>
              <option value="Siti Khadijah, M.Pd">Siti Khadijah, M.Pd</option>
            </select>
          </div>

          <div class="form-group">
            <label for="status" class="form-label">Status Penerbitan</label>
            <select id="status" class="form-input" required>
              <option value="Draft">Draft</option>
              <option value="Published">Published</option>
              <option value="Archived">Archived</option>
            </select>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Simpan Paket Ujian</button>
            <a href="index.html" class="btn btn-secondary">Batalkan</a>
          </div>

        </form>

      </section>

    </main>

    <footer class="page-footer">
      <p>© 2026 FloTest</p>
    </footer>

  </div>

</div>

</body>
</html>

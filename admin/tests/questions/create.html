<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tambah Soal — Admin FloTest</title>
  <link rel="stylesheet" href="../../../assets/css/style.css" />
</head>
<body>

  <div class="app-layout">
    
    <aside class="sidebar" aria-label="Sidebar navigasi">
      <div class="sidebar-brand">
        <div class="brand-logo">
          <div class="brand-icon">Flo</div>
          <span class="brand-name">Flo<span>Test</span></span>
        </div>
      </div>

      <div class="sidebar-user">
        <div class="user-avatar">ADM</div>
        <div class="user-info">
          <div class="user-name">Super Admin</div>
          <div class="user-role">Admin System</div>
        </div>
      </div>

      <nav class="sidebar-nav" aria-label="Menu admin">
        <div class="nav-label">Main Menu</div>
        <a href="../../dashboard.html" class="nav-item">
          <span class="nav-icon">🏠</span> Dashboard
        </a>
        <a href="../../users/index.html" class="nav-item">
          <span class="nav-icon">👥</span> Kelola Users
        </a>
        <a href="../index.html" class="nav-item active">
          <span class="nav-icon">📝</span> Kelola Tes
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="../../../index.html" class="nav-item btn-danger">
          <span class="nav-icon">🚪</span> Keluar
        </a>
      </div>
    </aside>

    <div class="main-content">
      
      <header class="topbar">
        <span class="topbar-title">Tambah Soal Baru</span>
      </header>

      <main class="page-body">
        
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="../../dashboard.html">Dashboard</a>
          <span class="breadcrumb-sep">›</span>
          <a href="../index.html">Kelola Tes</a>
          <span class="breadcrumb-sep">›</span>
          <a href="index.html">Bank Soal Master</a>
          <span class="breadcrumb-sep">›</span>
          <span>Tambah Soal</span>
        </nav>

        <section class="card">
          <div class="card-header">
            <h2 class="card-title">Form Input Soal Ujian Sistem</h2>
          </div>
          <div class="card-body">
            
            <form action="index.html" method="get">
              
              <div class="form-group">
                <label class="form-label">Teks Pertanyaan <span class="required">*</span></label>
                <textarea class="form-control" placeholder="Tuliskan pertanyaan bank soal master di sini..." required></textarea>
              </div>

              <div class="form-group">
                <label class="form-label">Opsi Pilihan Jawaban <span class="required">*</span></label>
                
                <div class="option-grid">
                  <div class="option-group">
                    <label class="form-hint" style="color: var(--color-success); font-weight: 600; display: block; margin-bottom: 4px;">Opsi A (Kunci Jawaban Benar)</label>
                    <input type="text" class="form-control" placeholder="Masukkan jawaban benar" required />
                  </div>
                  
                  <div class="option-group">
                    <label class="form-hint" style="display: block; margin-bottom: 4px;">Opsi B (Pengecoh)</label>
                    <input type="text" class="form-control" placeholder="Masukkan pengecoh jawaban" required />
                  </div>

                  <div class="option-group">
                    <label class="form-hint" style="display: block; margin-bottom: 4px;">Opsi C (Pengecoh)</label>
                    <input type="text" class="form-control" placeholder="Masukkan pengecoh jawaban" required />
                  </div>

                  <div class="option-group">
                    <label class="form-hint" style="display: block; margin-bottom: 4px;">Opsi D (Pengecoh)</label>
                    <input type="text" class="form-control" placeholder="Masukkan pengecoh jawaban" required />
                  </div>
                </div>
              </div>

              <hr class="section-divider" />

              <div class="form-actions">
                <button type="submit" class="btn btn-primary">Simpan Ke Bank Soal</button>
                <a href="index.html" class="btn btn-outline">Batal</a>
              </div>

            </form>

          </div>
        </section>

      </main>

      <footer>
        <span>© 2026 FloTest — Panel Administrasi Super</span>
      </footer>

    </div>
  </div>

</body>
</html>

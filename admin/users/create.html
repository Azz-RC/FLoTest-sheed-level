<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tambah User — FloTest</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body>

<div class="app-layout">

  <aside class="sidebar">

    <div class="sidebar-brand">
      <div class="brand-logo">
        <div class="brand-icon">Flo</div>
        <span class="brand-name">Flo<span>Test</span></span>
      </div>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar">ADM</div>
      <div class="user-info">
        <div class="user-name">Super Admin</div>
        <div class="user-role">Admin</div>
      </div>
    </div>

    <nav class="sidebar-nav">

      <div class="nav-label">Admin Menu</div>

      <a href="../dashboard.html" class="nav-item">
        🏠 Dashboard
      </a>

      <a href="index.html" class="nav-item active">
        👥 Users List
      </a>

      <a href="../tests/index.html" class="nav-item">
        📝 Tests List
      </a>

      <a href="../tests/questions/index.html" class="nav-item">
        ❓ Questions List
      </a>

    </nav>

    <div class="sidebar-footer">
      <a href="../../index.html" class="nav-item btn-danger">
        🚪 Logout
      </a>
    </div>

  </aside>

  <div class="main-content">

    <header class="topbar">
      <h1 class="topbar-title">Tambah User</h1>
    </header>

    <main class="page-body">

      <section class="content-section">

        <a href="index.html" class="btn btn-outline">
          ⬅️ Kembali ke Daftar User
        </a>

        <div class="card form-card">

          <div class="page-header">
            <h2>Form Tambah User</h2>
            <p>Lengkapi data pengguna baru.</p>
          </div>

          <form action="index.html" method="get">

            <div class="form-group">
              <label for="fullname">Nama Lengkap</label>
              <input
                type="text"
                id="fullname"
                name="fullname"
                class="form-control"
                placeholder="Masukkan nama lengkap"
                autocomplete="name"
                required>
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-control"
                placeholder="Masukkan email"
                autocomplete="email"
                required>
            </div>

            <div class="form-group">
              <label for="role">Role</label>
              <select
                id="role"
                name="role"
                class="form-control"
                required>
                <option value="">-- Pilih Role --</option>
                <option value="admin">Admin</option>
                <option value="mentor">Mentor</option>
                <option value="menti">Menti</option>
              </select>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary">💾 Simpan User</button>
              <a href="index.html" class="btn btn-outline">Batal</a>
            </div>

          </form>

        </div>

      </section>

    </main>

    <footer>© 2026 FloTest</footer>

  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User — FloTest</title>

    <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body>

<div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="sidebar-brand">
            <div class="brand-logo">
                <div class="brand-icon">Flo</div>
                <span class="brand-name">Flo<span>Test</span></span>
            </div>
        </div>

        <nav class="sidebar-nav">

            <div class="nav-label">
                Admin Menu
            </div>

            <a href="../dashboard.html" class="nav-item">
                🏠 Dashboard
            </a>

            <a href="index.html" class="nav-item active">
                👥 Users
            </a>

            <a href="../tests/index.html" class="nav-item">
                📝 Tests
            </a>

            <a href="../tests/questions/index.html" class="nav-item">
                ❓ Questions
            </a>

        </nav>

        <div class="sidebar-footer">
            <a href="../../index.html" class="nav-item btn-danger">
                🚪 Logout
            </a>
        </div>

    </aside>

    <!-- Main Content -->
    <div class="main-content">

        <header class="topbar">
            <h1 class="topbar-title">Edit User</h1>
        </header>

        <main class="page-body">

            <section class="content-section">

                <a href="index.html" class="btn btn-outline">
                    ⬅️ Kembali ke Daftar User
                </a>

                <div class="card form-card">

                    <div class="page-header">
                        <h2>Edit Data Pengguna</h2>
                        <p>Perbarui informasi pengguna yang dipilih.</p>
                    </div>

                    <form action="index.html" method="get">

                        <div class="form-group">
                            <label for="fullname">Nama Lengkap</label>

                            <input
                                type="text"
                                id="fullname"
                                name="fullname"
                                class="form-control"
                                value="Andi Saputra"
                                autocomplete="name"
                                required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>

                            <input
                                type="email"
                                id="email"
                                name="email"
                                class="form-control"
                                value="andi@mail.com"
                                autocomplete="email"
                                required>
                        </div>

                        <div class="form-group">
                            <label for="role">Role</label>

                            <select
                                id="role"
                                name="role"
                                class="form-control"
                                required>

                                <option value="admin">Admin</option>
                                <option value="mentor">Mentor</option>
                                <option value="menti" selected>Menti</option>

                            </select>
                        </div>

                        <div class="form-actions">

                            <button type="submit" class="btn btn-primary">
                                💾 Update User
                            </button>

                            <a href="index.html" class="btn btn-outline">
                                Batal
                            </a>

                        </div>

                    </form>

                </div>

            </section>

        </main>

        <footer>
            © 2026 FloTest
        </footer>

    </div>

</div>

</body>
</html>

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk — FloTest Authentication</title>

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body class="login-page">
    <div class="login-container">
      <!-- Brand -->
      <header class="login-brand">
        <div class="login-brand-icon">Flo</div>

        <h1>Flo<span>Test</span></h1>

        <p>Aplikasi Simulasi &amp; Ujian Online Berbasis Web</p>
      </header>

      <!-- Login Card -->
      <main class="login-card">
        <h2>Selamat Datang Kembali</h2>

        <p class="subtitle">Silakan pilih peran login simulasi di bawah ini untuk masuk ke dashboard.</p>

        <form action="#" method="post">
          <div class="form-group">
            <label class="form-label" for="login_email">
              Alamat Email
              <span class="required">*</span>
            </label>

            <input type="email" id="login_email" name="email" class="form-control" placeholder="nama@flotest.com" autocomplete="email" required />
          </div>

          <div class="form-group">
            <label class="form-label" for="login_password">
              Kata Sandi
              <span class="required">*</span>
            </label>

            <input type="password" id="login_password" name="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required />
          </div>

          <div class="section-divider"></div>

          <!-- Navigation -->
          <nav class="login-navigation" aria-label="Navigasi Login">
            <p class="form-label text-center mb-4">PILIH LOGIN AKSES SEBAGAI:</p>

            <div class="login-buttons">
              <a href="admin/dashboard.html" class="btn btn-primary btn-block btn-admin"> Masuk sebagai Admin </a>

              <a href="mentor/dashboard.html" class="btn btn-block btn-mentor"> Masuk sebagai Mentor </a>

              <a href="menti/dashboard.html" class="btn btn-block btn-menti"> Masuk sebagai Menti </a>
            </div>
          </nav>
        </form>
      </main>

      <!-- Footer -->
      <footer class="login-footer">
        <p>&copy; 2026 FloTest</p>
      </footer>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Mentor — FloTest</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" aria-label="Sidebar navigasi">
      <div class="sidebar-brand">
        <div class="brand-logo">
          <div class="brand-icon">Flo</div>
          <span class="brand-name">Flo<span>Test</span></span>
        </div>
      </div>

      <div class="sidebar-user">
        <div class="user-avatar">BS</div>
        <div class="user-info">
          <div class="user-name">Budi Santoso</div>
          <div class="user-role">Mentor</div>
        </div>
      </div>

      <nav class="sidebar-nav" aria-label="Menu mentor">
        <div class="nav-label">Menu</div>
        <a href="dashboard.html" class="nav-item active">
          <span class="nav-icon">🏠</span> Dashboard
        </a>
        <a href="tests.html" class="nav-item">
          <span class="nav-icon">📄</span> Daftar Tes
        </a>
        <a href="create-test.html" class="nav-item">
          <span class="nav-icon">➕</span> Buat Tes
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="../index.html" class="nav-item btn-danger">
          <span class="nav-icon">🚪</span> Keluar
        </a>
        
      </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">

      <header class="topbar">
        <span class="topbar-title">Dashboard Mentor</span>
        <div class="topbar-actions">
          <a href="create-test.html" class="btn btn-primary btn-sm">➕ Buat Tes Baru</a>
        </div>
      </header>

      <main class="page-body">

        <div class="page-header">
          <h1>Selamat datang, Budi! 👋</h1>
          <p>Kelola dan pantau tes yang kamu buat di sini.</p>
        </div>

        <!-- Stats -->
        <section aria-labelledby="mentor-stats-heading">
          <h2 id="mentor-stats-heading" class="hidden-heading">Ringkasan Mentor</h2>
          
          <div class="stats-grid">
            <article class="stat-card">
              <div class="stat-icon blue">📄</div>
              <div class="stat-info">
                <div class="stat-value">3</div>
                <div class="stat-label">Jumlah Tes</div>
              </div>
            </article>
            
            <article class="stat-card">
              <div class="stat-icon orange">❓</div>
              <div class="stat-info">
                <div class="stat-value">33</div>
                <div class="stat-label">Jumlah Soal</div>
              </div>
            </article>
            
            <article class="stat-card">
              <div class="stat-icon green">✅</div>
              <div class="stat-info">
                <div class="stat-value">1</div>
                <div class="stat-label">Tes Published</div>
              </div>
            </article>
            
            <article class="stat-card">
              <div class="stat-icon cyan">👤</div>
              <div class="stat-info">
                <div class="stat-value">12</div>
                <div class="stat-label">Total Peserta</div>
              </div>
            </article>
          </div> </section>

      </main>

      <footer>
        <span>© 2026 FloTest</span>
      </footer>

    </div> 
  </div> 
</body>
</html>

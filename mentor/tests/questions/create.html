<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tambah Soal Baru — FloTest</title>
  <link rel="stylesheet" href="../../../assets/css/style.css" />
</head>
<body>

  <div class="app-layout">
    
    <aside class="sidebar" aria-label="Sidebar navigasi">
      <div class="sidebar-brand">
        <div class="brand-logo">
          <div class="brand-icon">Flo</div>
          <span class="brand-name">Flo<span>Test</span></span>
        </div>
      </div>

      <div class="sidebar-user">
        <div class="user-avatar">BS</div>
        <div class="user-info">
          <div class="user-name">Budi Santoso</div>
          <div class="user-role">Mentor</div>
        </div>
      </div>

      <nav class="sidebar-nav" aria-label="Menu mentor">
        <div class="nav-label">Menu</div>
        <a href="../../dashboard.html" class="nav-item">
          <span class="nav-icon">🏠</span> Dashboard
        </a>
        <a href="../index.html" class="nav-item active">
          <span class="nav-icon">📝</span> Kelola Tes
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="../../../index.html" class="nav-item btn-danger">
          <span class="nav-icon">🚪</span> Keluar
        </a>
      </div>
    </aside>

    <div class="main-content">
      
      <header class="topbar">
        <span class="topbar-title">Tambah Soal Baru</span>
      </header>

      <main class="page-body">
        
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="../../dashboard.html">Dashboard</a>
          <span class="breadcrumb-sep">›</span>
          <a href="../index.html">Kelola Tes</a>
          <span class="breadcrumb-sep">›</span>
          <a href="index.html">Daftar Soal</a>
          <span class="breadcrumb-sep">›</span>
          <span>Tambah Soal</span>
        </nav>

        <section class="card" aria-labelledby="form-heading">
          <div class="card-header">
            <h2 class="card-title" id="form-heading">Form Khusus Soal Baru</h2>
          </div>
          <div class="card-body">
            
            <form action="index.html" method="get">
              
              <div class="form-group">
                <label class="form-label">Teks Pertanyaan <span class="required">*</span></label>
                <textarea class="form-control" placeholder="Tuliskan pertanyaan soal di sini..." required></textarea>
              </div>

              <div class="form-group">
                <label class="form-label">Opsi Jawaban Ujian <span class="required">*</span></label>
                
                <div class="option-grid">
                  <div class="option-group">
                    <label class="form-hint">Pilihan A (Jawaban Benar)</label>
                    <input type="text" class="form-control" placeholder="Masukkan jawaban benar untuk Opsi A" required />
                  </div>
                  
                  <div class="option-group">
                    <label class="form-hint">Pilihan B</label>
                    <input type="text" class="form-control" placeholder="Masukkan pengecoh Opsi B" required />
                  </div>

                  <div class="option-group">
                    <label class="form-hint">Pilihan C</label>
                    <input type="text" class="form-control" placeholder="Masukkan pengecoh Opsi C" required />
                  </div>

                  <div class="option-group">
                    <label class="form-hint">Pilihan D</label>
                    <input type="text" class="form-control" placeholder="Masukkan pengecoh Opsi D" required />
                  </div>
                </div>
              </div>

              <hr class="section-divider" />

              <div class="form-actions">
                <button type="submit" class="btn btn-primary">Tambah Soal</button>
                <a href="index.html" class="btn btn-outline">Batal</a>
              </div>

            </form>

          </div>
        </section>

      </main>

      <footer>
        <span>© 2026 FloTest</span>
      </footer>

    </div>
  </div>

</body>
</html>

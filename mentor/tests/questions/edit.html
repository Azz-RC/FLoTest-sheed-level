<!DOCTYPE html>

        <div class="brand-logo"><div class="brand-icon">Flo</div><span class="brand-name">Flo<span>Test</span></span></div>

      <nav class="sidebar-nav">

    <div class="main-content">

                    <input type="text" class="form-control" value="Bahasa pemrograman untuk membuat logika dan kalkulasi" required />

                </div>
              </div>

              <div class="form-actions">
                <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
